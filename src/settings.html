<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ablativo</title>
  <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/gotham" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="window">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-name">Ablativo</span>
      </div>

      <nav class="sidebar-nav">

        <button class="nav-item active" data-pane="general">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.2"/>
            <path d="M8 1.5v1.1M8 13.4v1.1M1.5 8h1.1M13.4 8h1.1M3.3 3.3l.78.78M11.92 11.92l.78.78M3.3 12.7l.78-.78M11.92 4.08l.78-.78"/>
          </svg>
          General
        </button>

        <button class="nav-item" data-pane="model">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <rect x="1"    y="5.5" width="2.2" height="5"  rx="1.1"/>
            <rect x="4.6"  y="2.5" width="2.2" height="11" rx="1.1"/>
            <rect x="8.2"  y="4"   width="2.2" height="8"  rx="1.1"/>
            <rect x="11.8" y="6.5" width="2.2" height="3"  rx="1.1"/>
          </svg>
          Model
        </button>

        <button class="nav-item" data-pane="history">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="6"/>
            <path d="M8 5v3l2 1.5"/>
          </svg>
          History
        </button>

      </nav>
    </aside>

    <!-- ── Content ──────────────────────────────────────────────────────── -->
    <main class="content">

      <!-- General pane ────────────────────────────────────────────────── -->
      <div class="pane active" id="pane-general">

        <div class="pane-section">
          <div class="section-title">SHORTCUT</div>

          <!-- Hotkey row -->
          <div class="row row-col">
            <span class="row-label">Transcription hotkey</span>
            <div class="hotkey-side">
              <div id="hotkeyDisplay" class="hotkey-badge">Ctrl + Space</div>
              <button id="hotkeyReset" class="btn-reset" title="Reset to Ctrl+Space">↺</button>
              <span id="hotkeyHint" class="row-hint">click to change</span>
            </div>
          </div>

          <!-- Enter to stop row -->
          <div class="row">
            <span class="row-label">Press Enter to finish</span>
            <label class="toggle">
              <input type="checkbox" id="enterToStopToggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>

        </div>

        <div class="pane-section">
          <div class="section-title">STARTUP</div>
          <div class="row">
            <span class="row-label">Launch on login</span>
            <label class="toggle">
              <input type="checkbox" id="autostartToggle" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
        </div>

      </div><!-- /pane-general -->

      <!-- Model pane ──────────────────────────────────────────────────── -->
      <div class="pane" id="pane-model">

        <div class="pane-section">
          <div class="section-title">ACTIVE MODEL</div>
          <div class="model-card">
            <div class="model-card-top">
              <div class="model-card-left">
                <div class="model-title-row">
                  <span class="model-name">Parakeet V3</span>
                  <span id="modelBadge" class="model-badge checking">Checking…</span>
                </div>
                <div class="model-sub">Fast and accurate</div>
              </div>
            </div>
            <div class="model-card-bottom">
              <span class="model-lang-tag">🌐  Multilingual</span>
              <div class="model-bars">
                <div class="bar-row">
                  <span class="bar-label">accuracy</span>
                  <div class="bar-track"><div class="bar-fill" style="width:82%"></div></div>
                </div>
                <div class="bar-row">
                  <span class="bar-label">speed</span>
                  <div class="bar-track"><div class="bar-fill" style="width:92%"></div></div>
                </div>
              </div>
            </div>
          </div>
          <button id="downloadBtn" class="btn-download" style="display:none">
            ↓  Download model  (456 MB)
          </button>
        </div>

      </div><!-- /pane-model -->

      <!-- History pane ────────────────────────────────────────────────── -->
      <div class="pane" id="pane-history">

        <div class="pane-section">
          <div class="section-title">RECENT TRANSCRIPTIONS</div>
          <ul id="historyList" class="history-list">
            <li class="history-empty">No transcriptions yet.</li>
          </ul>
        </div>

      </div><!-- /pane-history -->

    </main>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
